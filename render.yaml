services:
  - type: web
    name: elited-vip
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: artifacts/elited-vip/Dockerfile
    dockerContext: artifacts/elited-vip
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: elited-vip-db
          property: connectionString
      - key: PORT
        value: 10000
    healthCheckPath: /ping

databases:
  - name: elited-vip-db
    plan: free
    region: frankfurt
